<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>美髮店座位調度 V0.7</title>
<style>
:root{--paper:#fffaf0;--bg:#eee5d6;--line:#c8bda9;--ink:#28231f;--muted:#777;--time:56px;--col:112px;--flex:126px;--row:46px;--orange:#f6a24c;--yellow:#fff176;--pink:#ff75ad;--green:#8ee072;--blue:#7dc8ff;--purple:#c6a4ff}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;font-size:16px}.top{position:sticky;top:0;z-index:50;background:#f8efdf;border-bottom:2px solid #b7aa98;padding:8px}.title{display:flex;justify-content:space-between;align-items:end;margin-bottom:7px}h1{font-size:20px;margin:0;font-weight:900}.ver{font-size:13px;color:#777}.sync{display:inline-block;margin-left:7px;font-size:12px}.sync.online{color:#257329}.sync.offline{color:#a55b00}.sync.error{color:#b00020}.people{display:grid;grid-template-columns:72px minmax(230px,1fr);gap:6px;align-items:center}.people label{font-weight:900}.people input{height:38px;border:1px solid #bfb29f;border-radius:9px;background:white;padding:6px 10px;font-size:18px;min-width:0}.toolbar{display:flex;gap:7px;align-items:center;margin-top:8px;overflow-x:auto;padding-bottom:4px}.toolbar input[type=date]{height:40px;border:1px solid #c8bda9;border-radius:18px;background:#eee;padding:4px 10px;font-size:17px;min-width:150px}button{border:1px solid #bfb29f;border-radius:10px;background:#fff9ec;padding:8px 11px;font-size:17px;white-space:nowrap;cursor:pointer}.primary{background:#2d2924;color:white;border-color:#2d2924}.danger{background:#ffe9e9;border-color:#ffb8b8;color:#b00020}.ghost{background:white;color:#06c}.miniNote{font-size:12px;color:#777;white-space:nowrap}.parsed{font-size:13px;color:#5f5549;margin-top:4px}.notice{display:none;background:#fff0bd;border:1px solid #d6b648;border-radius:8px;padding:6px;margin-top:4px;font-size:14px}.notice.show{display:block}.stage{height:calc(100vh - 166px);overflow:auto;background:var(--bg);padding:8px}.paper{width:max-content;min-width:100%;background:var(--paper);border:2px solid #a99b87;box-shadow:0 4px 12px rgba(0,0,0,.14)}.grid{display:grid;grid-template-columns:var(--time) repeat(6,var(--col)) var(--flex);position:relative}.head{height:34px;display:flex;align-items:center;justify-content:center;font-weight:900;background:#fff2cc;border-right:1px solid #a99b87;border-bottom:2px solid #a99b87;position:sticky;top:0;z-index:10;font-size:14px}.head.timeHead{left:0;z-index:12;background:#f7ead8;color:#6d6257}.head.flex{background:#eadcff}.time{height:var(--row);border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#f8eddb;color:#6d6257;font-size:12px;text-align:center;padding-top:4px;position:sticky;left:0;z-index:9}.cell{height:var(--row);border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:rgba(255,255,255,.48);position:relative;touch-action:manipulation}.cell.flexCell{background:rgba(246,236,255,.65)}.cell:hover{outline:2px solid rgba(0,102,204,.20);outline-offset:-2px}.appt{position:absolute;left:4px;right:4px;top:3px;border:1.5px solid rgba(0,0,0,.42);border-radius:7px;padding:4px 5px;font-size:12px;line-height:1.18;z-index:3;box-shadow:0 2px 5px rgba(0,0,0,.14);overflow:hidden;white-space:pre-line;user-select:none;cursor:grab}.appt:active{cursor:grabbing}.appt .tri{font-weight:900}.appt .name{font-weight:900}.appt .meta{font-size:11px;opacity:.9}.d2{background:var(--orange)}.d3{background:var(--yellow)}.d5{background:var(--pink)}.d6{background:var(--green)}.d7{background:var(--blue)}.dx{background:var(--purple)}.dropHint{outline:3px solid rgba(0,128,0,.35)!important;outline-offset:-3px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.38);display:none;align-items:flex-end;justify-content:center;z-index:100}.modal.open{display:flex}.panel{background:#fffaf2;width:100%;max-width:680px;border-radius:16px 16px 0 0;padding:14px;box-shadow:0 -8px 24px rgba(0,0,0,.25);max-height:92vh;overflow:auto}.panel h2{margin:0 0 10px;font-size:20px}.form{display:grid;grid-template-columns:1fr 1fr;gap:8px}.form label{display:block;font-size:12px;color:#6a5f51;margin-bottom:2px}.form input,.form select{width:100%;border:1px solid #bfb29f;border-radius:8px;background:white;padding:9px;font-size:16px}.full{grid-column:1/-1}.suffixes{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.suffixes button{font-size:14px;padding:5px 9px;border-radius:999px}.checks{display:flex;flex-wrap:wrap;gap:6px;padding:6px;border:1px solid #bfb29f;border-radius:8px;background:white;min-height:42px}.checkItem{display:inline-flex;align-items:center;gap:4px;border:1px solid #d2c7b8;border-radius:999px;padding:5px 8px;background:#fffaf2;font-size:14px}.checkItem input{width:auto;margin:0}.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}.hint{font-size:12px;color:#777;margin-top:2px}
@media(min-width:780px){:root{--col:116px;--flex:126px;--row:44px}.stage{height:calc(100vh - 160px)}.modal{align-items:center}.panel{border-radius:16px}}
</style>
</head>
<body>
<div class="top">
 <div class="title"><h1>美髮店座位調度</h1><span class="ver">V0.7 雲端同步<span id="syncStatus" class="sync offline">● 連線中</span></span></div>
 <div class="people"><label>設計師</label><input id="designerInput" value="256"><label>助理</label><input id="assistantInput" value="30,36(下),51,52"></div>
 <div class="parsed" id="parsedPeople"></div>
 <div class="toolbar"><input type="date" id="dateInput"><button class="primary" id="addBtn">＋新增</button><button class="ghost" id="checkBtn">檢查空格</button><button class="danger" id="clearBtn">清空</button><span class="miniNote">(上)=到14:30　(下)=14:30後到</span></div>
 <div id="holeNotice" class="notice">⚠️ 發現六格中間有空格。<button id="organizeBtn">整理</button><button id="ignoreBtn">忽略</button></div>
</div>
<noscript><div style="padding:10px;background:#ffe8e8;color:#900;font-weight:700">這個預覽沒有啟用 JavaScript，所以只能看版面，不能新增/拖曳。請用 Safari 或 Chrome 測試互動。</div></noscript>
<div class="stage" id="stage"><div class="paper"><div class="grid" id="grid"></div></div></div>
<div class="modal" id="modal"><div class="panel"><h2 id="modalTitle">新增預約</h2><div class="form">
 <div><label>姓名</label><input id="name" placeholder="王小姐"><div class="suffixes"><button type="button" data-suffix="小姐">小姐</button><button type="button" data-suffix="先生">先生</button><button type="button" data-suffix="小孩">小孩</button></div></div>
 <div><label>電話</label><input id="phone" placeholder="0912..."></div>
 <div class="full"><label>項目（可複選）</label><div id="serviceChecks" class="checks"></div><div class="hint">勾選後會自動建議時長，但仍可手動調整。</div></div>
 <div><label>時長</label><select id="duration"><option value="1">30分</option><option value="2">1小時</option><option value="3">1.5小時</option><option value="4">2小時</option><option value="5">2.5小時</option><option value="6">3小時</option><option value="7">3.5小時</option><option value="8">4小時</option></select></div>
 <div><label>設計師顏色</label><select id="designer"><option value="x">不指定/紫</option><option value="2">2 橘</option><option value="3">3 黃</option><option value="5">5 桃紅</option><option value="6">6 綠</option><option value="7">7 藍</option></select></div>
 <div><label>指定技術師 △</label><input id="assign" placeholder="例：5 或 36"><div class="hint">設計師或助理都可填。</div></div>
 <div><label>時間</label><select id="start"></select></div>
 <div class="full"><label>備註</label><input id="note" placeholder="可空白"></div></div>
 <div class="actions"><button id="deleteBtn" class="danger" style="display:none">刪除</button><button id="cancelBtn">取消</button><button id="saveBtn" class="primary">儲存</button></div></div></div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
(function(){
const START_H=8, END_H=20, ROWS=(END_H-START_H)*2+1, ROWPX=44;
const SERVICES=[['S洗',1],['K剪',2],['洗剪',3],['染',6],['補染',4],['燙',8],['護',4],['頭皮',3],['單造型',2]];
let appts=[], editingId=null, storageOK=true, memory={}, db=null, unsubscribe=null, cloudReady=false;
const $=id=>document.getElementById(id);
function safeGet(k){try{return storageOK?localStorage.getItem(k):memory[k]}catch(e){storageOK=false;return memory[k]||null}}
function safeSet(k,v){try{if(storageOK)localStorage.setItem(k,v);else memory[k]=v}catch(e){storageOK=false;memory[k]=v}}
function todayLocal(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)}
function key(){return 'salon-v06-'+$('dateInput').value}
function setSyncStatus(text,state='offline'){$('syncStatus').textContent='● '+text;$('syncStatus').className='sync '+state}
function isFirebaseConfigured(){const c=window.FIREBASE_CONFIG||{};return Boolean(c.apiKey&&c.projectId&&c.appId&&!String(c.apiKey).includes('請填入'))}
function appointmentsRef(date=$('dateInput').value){return db.collection('salons').doc('default').collection('dates').doc(date).collection('appointments')}
function cleanAppt(a,id){return {id:id||a.id,name:String(a.name||'未命名'),phone:String(a.phone||''),services:Array.isArray(a.services)?a.services:[],duration:Number(a.duration)||2,designer:String(a.designer||'x'),assign:String(a.assign||''),start:Number(a.start)||0,note:String(a.note||''),col:Number(a.col)||7}}
function cloudData(a){const x=cleanAppt(a);delete x.id;return {...x,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}}
async function cloudUpsert(a){if(!cloudReady){saveLocal();return}setSyncStatus('同步中');try{await appointmentsRef().doc(a.id).set(cloudData(a));setSyncStatus('已同步','online')}catch(e){setSyncStatus('同步失敗','error');console.error('Firestore save failed',e);alert('雲端同步失敗，請檢查網路後再試。')}}
async function cloudDelete(id){if(!cloudReady){saveLocal();return}setSyncStatus('同步中');try{await appointmentsRef().doc(id).delete();setSyncStatus('已同步','online')}catch(e){setSyncStatus('同步失敗','error');console.error('Firestore delete failed',e);alert('雲端刪除失敗，請檢查網路後再試。')}}
async function cloudReplaceAll(previous,next){if(!cloudReady){saveLocal();return}setSyncStatus('同步中');try{const batch=db.batch();previous.forEach(a=>batch.delete(appointmentsRef().doc(a.id)));next.forEach(a=>batch.set(appointmentsRef().doc(a.id),cloudData(a)));await batch.commit();setSyncStatus('已同步','online')}catch(e){setSyncStatus('同步失敗','error');console.error('Firestore batch failed',e);alert('雲端同步失敗，請檢查網路後再試。')}}
async function migrateV06IfNeeded(snapshot,date,ref){const marker='salon-v07-migrated-'+date;if(!snapshot.empty||safeGet(marker))return;let old=[];try{old=JSON.parse(safeGet('salon-v06-'+date)||'[]')}catch(e){}if(old.length){const batch=db.batch();old.map(a=>cleanAppt(a)).forEach(a=>batch.set(ref.doc(a.id),cloudData(a)));await batch.commit()}safeSet(marker,'1')}
function listenDate(){if(unsubscribe)unsubscribe();if(!cloudReady){loadLocal();return}const date=$('dateInput').value,ref=appointmentsRef(date);setSyncStatus(navigator.onLine?'連線中':'離線快取',navigator.onLine?'offline':'error');unsubscribe=ref.onSnapshot({includeMetadataChanges:true},async snap=>{if(date!==$('dateInput').value)return;await migrateV06IfNeeded(snap,date,ref);if(date!==$('dateInput').value)return;appts=snap.docs.map(d=>cleanAppt(d.data(),d.id));safeSet('salon-v07-cache-'+date,JSON.stringify(appts));render();setSyncStatus(snap.metadata.fromCache?'離線快取':'已同步',snap.metadata.fromCache?'offline':'online')},e=>{console.error('Firestore listener failed',e);setSyncStatus('同步失敗','error');loadCache()})}
function loadCache(){try{appts=JSON.parse(safeGet('salon-v07-cache-'+$('dateInput').value)||safeGet(key())||'[]')}catch(e){appts=[]}render()}
async function initFirebase(){if(!isFirebaseConfigured()){setSyncStatus('尚未設定 Firebase','error');loadLocal();return}try{firebase.initializeApp(window.FIREBASE_CONFIG);await firebase.auth().signInAnonymously();db=firebase.firestore();db.enablePersistence({synchronizeTabs:true}).catch(e=>{if(e.code!=='failed-precondition'&&e.code!=='unimplemented')console.warn('Firestore persistence unavailable',e)});cloudReady=true;listenDate()}catch(e){console.error('Firebase init failed',e);setSyncStatus('Firebase 錯誤：'+(e.code||'unknown'),'error');loadLocal()}}
function tLabel(row){let total=START_H*60+row*30;return String(Math.floor(total/60)).padStart(2,'0')+':'+String(total%60).padStart(2,'0')}
function rowFromTime(t){let p=t.split(':').map(Number);return ((p[0]-START_H)*60+p[1])/30}
function esc(s){return String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function parseDesigners(str){let s=String(str||'').replace(/[，、.。\s,]+/g,'');let out=[];for(const ch of s){if(/[0-9]/.test(ch)&&!out.includes(ch)) out.push(ch)}return out}
function parseAssistants(str){let s=String(str||'').replace(/[，、.。\s,]+/g,'');let out=[];let re=/(\d{2})(\((?:上|下)\))?/g,m;while((m=re.exec(s))){out.push(m[1]+(m[2]||''))}return out}
function updatePeople(){const ds=parseDesigners($('designerInput').value);const as=parseAssistants($('assistantInput').value);$('parsedPeople').textContent='設計師：'+(ds.join('、')||'未填')+'　｜　助理：'+(as.join('、')||'未填')}
function buildGrid(){const g=$('grid');g.innerHTML='';['時間','格1','格2','格3','格4','格5','格6','彈性區'].forEach((h,i)=>{const d=document.createElement('div');d.className='head '+(i===0?'timeHead ':'')+(i===7?'flex':'');d.textContent=h;g.appendChild(d)});for(let r=0;r<ROWS;r++){let time=document.createElement('div');time.className='time';time.textContent=tLabel(r);g.appendChild(time);for(let c=1;c<=7;c++){let cell=document.createElement('div');cell.className='cell '+(c===7?'flexCell':'');cell.dataset.row=r;cell.dataset.col=c;cell.addEventListener('dblclick',()=>openNew(tLabel(r)));cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('dropHint')});cell.addEventListener('dragleave',()=>cell.classList.remove('dropHint'));cell.addEventListener('drop',e=>{e.preventDefault();cell.classList.remove('dropHint');const id=e.dataTransfer.getData('text/plain');moveAppt(id,r,c)});g.appendChild(cell)}}}
function fillSelects(){const st=$('start');st.innerHTML='';for(let r=0;r<ROWS;r++){const o=document.createElement('option');o.value=tLabel(r);o.textContent=tLabel(r);st.appendChild(o)}const sc=$('serviceChecks');sc.innerHTML='';SERVICES.forEach(([name])=>{const lab=document.createElement('label');lab.className='checkItem';lab.innerHTML='<input type="checkbox" value="'+esc(name)+'">'+esc(name);sc.appendChild(lab)});sc.addEventListener('change',()=>{const selected=getServices();if(!selected.length)return;let max=2;SERVICES.forEach(([n,d])=>{if(selected.includes(n)) max=Math.max(max,d)});$('duration').value=String(max)})}
function getServices(){return Array.from(document.querySelectorAll('#serviceChecks input:checked')).map(i=>i.value)}
function setServices(arr){document.querySelectorAll('#serviceChecks input').forEach(i=>i.checked=arr.includes(i.value))}
function saveLocal(){safeSet(key(),JSON.stringify(appts))}
function loadLocal(){try{appts=JSON.parse(safeGet(key())||'[]')}catch(e){appts=[]}render()}
function isOverlap(a,b){return a.start < b.start + b.duration && b.start < a.start + a.duration}
function canPlace(appt,col,start,duration,ignoreId){if(start+duration>ROWS) return false;return !appts.some(a=>a.id!==ignoreId && Number(a.col)===Number(col) && isOverlap({start,duration},{start:a.start,duration:a.duration}))}
function autoCol(start,duration,ignoreId){for(let c=1;c<=6;c++){if(canPlace(null,c,start,duration,ignoreId)) return c}return 7}
function render(){document.querySelectorAll('.appt').forEach(n=>n.remove());appts.forEach(a=>{const cell=document.querySelector(`.cell[data-row="${a.start}"][data-col="${a.col}"]`);if(!cell)return;const div=document.createElement('div');div.className='appt d'+(a.designer||'x');div.style.height=Math.max(34,a.duration*ROWPX-6)+'px';div.draggable=true;div.dataset.id=a.id;div.innerHTML=(a.assign?`<div class="tri">△${esc(a.assign)}</div>`:'')+`<div class="name">${esc(a.name)}</div><div>${esc((a.services||[]).join('+'))}</div>`+(a.phone?`<div class="meta">${esc(a.phone)}</div>`:'')+(a.note?`<div class="meta">${esc(a.note)}</div>`:'');div.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',a.id)});div.addEventListener('dblclick',e=>{e.stopPropagation();openEdit(a.id)});cell.appendChild(div)});checkHoles(false)}
function openNew(time){editingId=null;$('modalTitle').textContent='新增預約';$('deleteBtn').style.display='none';$('name').value='';$('phone').value='';setServices([]);$('duration').value='2';$('designer').value='x';$('assign').value='';$('start').value=time||'10:00';$('note').value='';$('modal').classList.add('open');setTimeout(()=>$('name').focus(),50)}
function openEdit(id){const a=appts.find(x=>x.id===id);if(!a)return;editingId=id;$('modalTitle').textContent='修改預約';$('deleteBtn').style.display='inline-block';$('name').value=a.name||'';$('phone').value=a.phone||'';setServices(a.services||[]);$('duration').value=String(a.duration||2);$('designer').value=a.designer||'x';$('assign').value=a.assign||'';$('start').value=tLabel(a.start);$('note').value=a.note||'';$('modal').classList.add('open')}
function closeModal(){$('modal').classList.remove('open')}
function saveForm(){const start=rowFromTime($('start').value), duration=Number($('duration').value);const data={name:$('name').value.trim()||'未命名',phone:$('phone').value.trim(),services:getServices(),duration,designer:$('designer').value,assign:$('assign').value.trim(),start,note:$('note').value.trim()};if(editingId){const old=appts.find(a=>a.id===editingId);data.id=editingId;data.col=autoCol(start,duration,editingId);Object.assign(old,data)}else{data.id=crypto.randomUUID?crypto.randomUUID():String(Date.now())+Math.random().toString(16).slice(2);data.col=autoCol(start,duration,null);appts.push(data)}closeModal();render();cloudUpsert(data)}
function deleteCurrent(){if(!editingId)return;const id=editingId;appts=appts.filter(a=>a.id!==id);closeModal();render();cloudDelete(id)}
function moveAppt(id,row,col){const a=appts.find(x=>x.id===id);if(!a)return;if(canPlace(a,col,row,a.duration,a.id)){a.start=row;a.col=col;render();cloudUpsert(a)}else alert('這裡會重疊，先不放。')}
function clearAll(){if(confirm('清空今天所有預約？')){const previous=[...appts];appts=[];render();cloudReplaceAll(previous,[])}}
function checkHoles(showAlert=true){let hasHole=false;for(let r=0;r<ROWS;r++){let seen=false,hole=false;for(let c=1;c<=6;c++){let has=appts.some(a=>a.col===c && a.start<=r && r<a.start+a.duration);if(has&&hole)hasHole=true;if(has)seen=true;if(!has&&seen)hole=true}}$('holeNotice').classList.toggle('show',hasHole);if(showAlert)alert(hasHole?'有空格可以整理。':'目前沒有明顯空格。')}
function organize(){const previous=[...appts];const sorted=[...appts].sort((a,b)=>a.start-b.start||a.col-b.col);let placed=[];for(const a of sorted){let tmp={...a};let col=7;for(let c=1;c<=6;c++){if(!placed.some(p=>p.col===c && isOverlap({start:tmp.start,duration:tmp.duration},{start:p.start,duration:p.duration}))){col=c;break}}tmp.col=col;placed.push(tmp)}appts=placed;render();cloudReplaceAll(previous,placed);$('holeNotice').classList.remove('show')}
function suffix(s){const el=$('name');let v=el.value.trim();v=v.replace(/(小姐|先生|小孩)$/,'');el.value=v+s;el.focus()}
function init(){buildGrid();fillSelects();$('dateInput').value=todayLocal();$('addBtn').onclick=()=>openNew('10:00');$('cancelBtn').onclick=closeModal;$('saveBtn').onclick=saveForm;$('deleteBtn').onclick=deleteCurrent;$('clearBtn').onclick=clearAll;$('checkBtn').onclick=()=>checkHoles(true);$('organizeBtn').onclick=organize;$('ignoreBtn').onclick=()=>$('holeNotice').classList.remove('show');$('dateInput').onchange=listenDate;$('designerInput').addEventListener('input',updatePeople);$('assistantInput').addEventListener('input',updatePeople);document.querySelectorAll('.suffixes button').forEach(b=>b.onclick=()=>suffix(b.dataset.suffix));window.addEventListener('online',()=>{if(cloudReady)setSyncStatus('連線中')});window.addEventListener('offline',()=>setSyncStatus('離線快取','offline'));updatePeople();initFirebase()}
init();
})();
</script>
</body>
</html>
